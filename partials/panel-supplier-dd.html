<div class="panel" id="panel-supplier-dd">
        <div class="panel-box">
          <div class="panel-title-row">
            <div>
              <h2>Supplier Due Diligence</h2>
              <p class="panel-subtitle">Upload an Excel file to extract and view all data in a clean table.</p>
            </div>
          </div>
          <div class="panel-card sdd-saved-card">
            <label class="sdd-section-label" for="scr-saved-select">Saved screening (Draft / Submitted)</label>
            <div class="sdd-toolbar">
              <button type="button" id="scr-refresh-list" class="btn-sm btn-outline">Refresh List</button>
              <button type="button" id="scr-exit-load" class="btn-sm btn-outline-warm">Exit Load Mode</button>
            </div>
            <select id="scr-saved-select" class="scr-saved-select-sr" aria-hidden="true" tabindex="-1">
              <option value="">— Select saved screening —</option>
            </select>
            <div id="scr-saved-list-wrap" class="scr-saved-list-outer"></div>
          </div>
          <div class="panel-card sdd-upload-card">
            <div class="field sdd-field-tight">
              <label for="supplierExcelFile">Choose Excel file (.xlsx or .xls)</label>
              <input type="file" id="supplierExcelFile" accept=".xlsx,.xls" onchange="supplierHandleFileUpload(event)">
            </div>
            <div class="field" id="supplierSheetSelectContainer" style="display:none;margin-bottom:0;">
              <label for="supplierSheetSelect">Select sheet</label>
              <select id="supplierSheetSelect" onchange="supplierDisplaySelectedSheet()"></select>
            </div>
          </div>
          <div id="supplierExcelData" style="overflow-x:auto;width:100%;"></div>
        </div>
      </div>
