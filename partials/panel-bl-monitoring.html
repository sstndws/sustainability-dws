      <!-- ── DECLARATION MONITORING PANEL (Shipping / Declaration / SD) ── -->
      <div class="panel" id="panel-bl-monitoring">
        <div class="breadcrumb">Dashboard <span>/ Declaration Monitoring</span></div>
        <div class="page-header">
          <h1>Declaration Monitoring</h1>
          <p>Track shipping BLs, declarations, and SD monitoring records with linked traceability data</p>
        </div>

        <div class="stats-row bl-stats-row" id="bl-stats-row" aria-live="polite">
          <div class="stat-card"><div class="stat-card-num" id="bl-stat-1">—</div><div class="stat-card-label" id="bl-stat-1-label">Total records</div></div>
          <div class="stat-card"><div class="stat-card-num" id="bl-stat-2">—</div><div class="stat-card-label" id="bl-stat-2-label">Onprogress</div></div>
          <div class="stat-card"><div class="stat-card-num" id="bl-stat-3">—</div><div class="stat-card-label" id="bl-stat-3-label">Done</div></div>
          <div class="stat-card"><div class="stat-card-num" id="bl-stat-4">—</div><div class="stat-card-label" id="bl-stat-4-label">Linked Mills</div></div>
        </div>

        <div class="table-card bl-list-card">
          <div class="table-header bl-table-header">
            <div class="bl-table-header-left">
              <h3 id="bl-table-title">Shipping registry</h3>
              <div class="bl-source-tabs" role="tablist" aria-label="Declaration monitoring views">
                <button type="button" class="bl-source-tab active" data-bl-type="shipping" role="tab" aria-selected="true">Shipping</button>
                <button type="button" class="bl-source-tab" data-bl-type="declaration" role="tab" aria-selected="false">Declaration</button>
                <button type="button" class="bl-source-tab" data-bl-type="sd" role="tab" aria-selected="false">SD Monitoring</button>
              </div>
            </div>
            <div class="table-actions">
              <button class="btn-sm btn-outline" type="button" id="btn-export-bl">Export Excel</button>
              <button class="btn-sm btn-filled" type="button" id="btn-add-bl">+ Add Shipping</button>
            </div>
          </div>
          <div class="search-bar">
            <span class="search-icon"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/></svg></span>
            <input type="text" id="blSearch" placeholder="Search BL no., vessel, buyer, port, status..." />
            <button class="search-clear" type="button" id="blSearchClear">
              <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
          </div>
          <div id="bl-loading" class="dash-loading-host"><div class="dash-loading" role="status" aria-live="polite"><div class="dash-loading__visual" aria-hidden="true"><span class="dash-loading__ring"></span><span class="dash-loading__dot"></span></div><p class="dash-loading__label">Loading…</p></div></div>
          <div class="bl-table-wrap">
            <table id="blTable" class="bl-registry-table" style="display:none;">
              <thead><tr id="blTableHeadRow"></tr></thead>
              <tbody id="blTableBody"></tbody>
            </table>
          </div>
          <div id="bl-error" style="display:none;padding:32px;text-align:center;color:#c0392b;font-size:14px;"></div>
        </div>
      </div>
