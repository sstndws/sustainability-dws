      <!-- ── TTM & TTP PANEL ── -->
      <div class="panel" id="panel-ttm-ttp">
        <div class="breadcrumb">Dashboard <span>/ Traceability Data</span></div>
        <div class="page-header">
          <h1>Traceability Data</h1>
          <p>Trade partner and trade point monitoring data</p>
        </div>

        <section class="ttp-overview" aria-label="Period and traceability overview">
          <header class="ttp-overview__toolbar">
            <div class="ttp-overview__period" id="ttpPeriodPickers">
              <label class="ttp-overview__year" id="ttpPeriodYearWrap" for="ttpPeriodYear">
                <span class="ttp-overview__year-label">Year</span>
                <select id="ttpPeriodYear" class="ttp-overview__year-select" autocomplete="off"></select>
              </label>
            </div>
          </header>

          <div class="ttp-overview__matrix">
            <div class="ttp-overview__matrix-head">
              <span class="ttp-overview__axis" aria-hidden="true"></span>
              <span class="ttp-overview__col">CPO</span>
              <span class="ttp-overview__col">PK</span>
            </div>
            <div class="ttp-overview__matrix-row ttp-overview__matrix-row--ttm">
              <div class="ttp-overview__row-label">
                <span class="ttp-overview__row-type">TTM</span>
                <span class="ttp-overview__row-hint">Traceable</span>
              </div>
              <div class="ttp-overview__metric">
                <span class="ttp-overview__value" id="ttp-stat-cpo-ttm-coord">—</span>
              </div>
              <div class="ttp-overview__metric">
                <span class="ttp-overview__value" id="ttp-stat-pk-ttm-coord">—</span>
              </div>
            </div>
            <div class="ttp-overview__matrix-row ttp-overview__matrix-row--ttp">
              <div class="ttp-overview__row-label">
                <span class="ttp-overview__row-type">TTP</span>
                <span class="ttp-overview__row-hint">Traceable</span>
              </div>
              <div class="ttp-overview__metric">
                <span class="ttp-overview__value" id="ttp-stat-cpo-traceable">—</span>
              </div>
              <div class="ttp-overview__metric">
                <span class="ttp-overview__value" id="ttp-stat-pk-traceable">—</span>
              </div>
            </div>
          </div>
        </section>

        <!-- Category mix — % of all records (5 supplier types) -->
        <section class="ttp-category-mix-card" id="ttpCategoryMixSection" hidden aria-label="Category traceable TTP Data">
          <div class="ttp-category-mix-header">
            <div class="ttp-category-mix-header-text">
              <h2 class="ttp-category-mix-title"><span class="ttp-category-mix-badge">TTP</span>Category traceable data</h2>
              <p class="ttp-category-mix-desc">detail of suppliers category.</p>
            </div>
            <button type="button" class="ttp-category-mix-toggle" id="btn-ttp-category-mix-toggle" aria-expanded="true" aria-controls="ttpCategoryMixBody">
              <span class="ttp-category-mix-toggle-label">Hide</span>
              <svg class="ttp-category-mix-toggle-chev" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="18 15 12 9 6 15"/></svg>
            </button>
          </div>
          <div class="ttp-category-mix-body" id="ttpCategoryMixBody">
            <div class="ttp-category-mix-bar" id="ttpCategoryMixBar" role="presentation" aria-hidden="true"></div>
            <div class="ttp-category-mix-grid" id="ttpCategoryMixGrid"></div>
          </div>
        </section>

        <div class="table-card">
          <div class="table-header">
            <h3>TTM/TTP Registry</h3>
            <div class="table-actions">
              <button class="btn-sm btn-filled" id="btn-add-ttp">+ Add Record</button>
            </div>
          </div>
          <!-- ── TTP TOOLBAR ── -->
          <div class="ttp-toolbar">
            <!-- Select by Column (dynamic) -->
            <div class="ttp-dropdown-wrap" id="ttpSelectWrap">
              <button class="ttp-btn-select" id="ttpBtnSelect">
                <span class="ttp-btn-icon"><svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></svg></span>
                <span id="ttpBtnSelectLabel">Select</span>
                <span class="ttp-btn-icon" style="opacity:0.5;"><svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></span>
              </button>
              <div class="ttp-dropdown-panel ttp-dropdown-panel--select" id="ttpSelectPanel">
                <div class="ttp-dropdown-head">
                  <span class="ttp-dropdown-title">Filter by column</span>
                  <div class="ttp-dropdown-actions">
                    <button type="button" id="ttpSelectAll">All</button>
                    <button type="button" id="ttpSelectNone">None</button>
                  </div>
                </div>
                <div class="ttp-dropdown-col-section">
                  <div class="ttp-dropdown-section-label">Select column</div>
                  <div id="ttpColPickerList" class="ttp-col-picker-list"></div>
                </div>
                <div class="ttp-dropdown-search">
                  <input type="text" id="ttpCompanySearch" placeholder="Search values…" autocomplete="off" />
                </div>
                <div class="ttp-dropdown-list" id="ttpCompanyList"></div>
              </div>
            </div>

            <!-- Filter Columns -->
            <div class="ttp-dropdown-wrap" id="ttpFilterWrap">
              <button class="ttp-btn-filter" id="ttpBtnFilter">
                <span class="ttp-btn-icon"><svg viewBox="0 0 24 24"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/></svg></span>
                Filter columns
                <span class="ttp-btn-icon" style="opacity:0.5;"><svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></span>
              </button>
              <div class="ttp-dropdown-panel" id="ttpFilterPanel">
                <div class="ttp-dropdown-head">
                  <span class="ttp-dropdown-title">Filter columns</span>
                </div>
                <div class="ttp-col-mode-list" id="ttpColumnModeList" role="radiogroup" aria-label="Filter TTM or TTP columns"></div>
              </div>
            </div>

            <!-- Reset table filters (search, Select, Filter Kolom) -->
            <button type="button" class="ttp-btn-reset-filters" id="ttpBtnResetFilters" title="Reset search, Select, and column filters" disabled>
              <span class="ttp-btn-icon"><svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 0 1 15-6.7L21 3v6h-6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 21v-6h6"/></svg></span>
              Reset Filter
            </button>

            <!-- Export XLSX -->
            <button class="ttp-btn-export-xlsx" id="btn-export-ttp-xlsx" disabled>
              <span class="ttp-btn-icon"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg></span>
              Export XLSX
            </button>

            <div class="ttp-selection-info" id="ttpSelectionInfo" style="display:none;">
              <span id="ttpSelectionText"></span>
            </div>
          </div>

          <div class="ttp-group-info-bar" id="ttpGroupInfo"></div>

          <div class="search-bar">
            <span class="search-icon"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/></svg></span>
            <input type="text" id="ttpSearch" placeholder="Search..." />
            <button class="search-clear" id="ttpSearchClear">
              <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
          </div>
          <div id="ttp-loading" class="dash-loading-host"><div class="dash-loading" role="status" aria-live="polite"><div class="dash-loading__visual" aria-hidden="true"><span class="dash-loading__ring"></span><span class="dash-loading__dot"></span></div><p class="dash-loading__label">Loading…</p></div></div>
          <div class="table-scroll ttp-table-scroll">
            <table id="ttpTable" class="ttp-registry-table" style="display:none;">
              <thead id="ttpTableHead"></thead>
              <tbody id="ttpTableBody"></tbody>
            </table>
          </div>
          <div id="ttp-error" style="display:none;padding:32px;text-align:center;color:#c0392b;font-size:14px;"></div>
        </div>
      </div>
